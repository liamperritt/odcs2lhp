name: customer
version: 1.0.0
description: Customer master
columns:
- name: customer_id
  type: BIGINT
  nullable: false
  comment: Surrogate customer key
- name: tenant_id
  type: BIGINT
  nullable: false
  comment: Tenant partition key
- name: email
  type: STRING
  nullable: true
  comment: Customer email
- name: signup_count
  type: INT
  nullable: true
  comment: Number of signups
- name: labels
  type: ARRAY<STRING>
  nullable: true
  comment: Free-form labels
- name: _processing_timestamp
  type: TIMESTAMP
  nullable: true
  comment: LHP processing timestamp (operational metadata)
- name: _source_file
  type: STRING
  nullable: true
  comment: Source file path (operational metadata)
- name: __START_AT
  type: TIMESTAMP
  nullable: true
  comment: SCD2 effective-from (LHP-injected)
- name: __END_AT
  type: TIMESTAMP
  nullable: true
  comment: SCD2 effective-to (LHP-injected)
primary_key:
- tenant_id
- customer_id
