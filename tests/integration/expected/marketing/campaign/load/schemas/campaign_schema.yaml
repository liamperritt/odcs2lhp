name: campaign
version: 1.0.0
description: Marketing campaigns
columns:
- name: campaign_id
  type: BIGINT
  nullable: false
  comment: Campaign identifier
- name: name
  type: STRING
  nullable: false
  comment: Human-readable campaign name
- name: budget
  type: DECIMAL(12,2)
  nullable: true
  comment: Campaign budget
- name: launch_date
  type: STRING
  nullable: true
  comment: Launch date, US-formatted string in the source
- name: created_at
  type: STRING
  nullable: true
  comment: Creation timestamp, ISO-with-T string in the source
- name: updated_at
  type: STRING
  nullable: true
  comment: Update timestamp, wall-clock string in a fixed zone
- name: audience
  type: STRING
  nullable: true
  comment: Target audience, JSON-encoded object in the source
- name: channels
  type: STRING
  nullable: true
  comment: Delivery channels, JSON array in the source
- name: raw_payload
  type: STRING
  nullable: true
  comment: Free-form vendor payload, parsed to a variant
- name: tracking_pixel
  type: STRING
  nullable: true
  comment: Base64-encoded tracking pixel bytes
