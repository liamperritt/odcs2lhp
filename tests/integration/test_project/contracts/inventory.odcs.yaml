version: "2.1.0"
apiVersion: v3.0.2
kind: DataContract
id: 22222222-2222-2222-2222-222222222222
status: active
name: inventory-contract
tags:
  - "domain:inventory"
schema:
  - name: products
    physicalType: table
    description: Product catalog
    tags:
      - "domain:catalog"
    properties:
      - name: sku
        logicalType: string
        physicalType: STRING
        required: true
        primaryKey: true
        primaryKeyPosition: 1
        description: Stock-keeping unit
        tags:
          - "semantic:identifier"
        logicalTypeOptions:
          pattern: "^[A-Z0-9-]+$"
      - name: unit_price
        logicalType: number
        physicalType: DECIMAL(18,2)
        required: true
        description: Unit price in USD
        logicalTypeOptions:
          minimum: 0
          maximum: 1000000
      - name: dimensions
        logicalType: object
        physicalType: STRUCT<length:DOUBLE,width:DOUBLE>
        description: Physical dimensions
        logicalTypeOptions:
          required:
            - length
            - width
  - name: warehouses
    physicalType: table
    description: Warehouse locations
    properties:
      - name: warehouse_id
        physicalName: wh_id
        logicalType: integer
        physicalType: BIGINT
        required: true
        primaryKey: true
        primaryKeyPosition: 1
        description: Warehouse identifier
      - name: opened_on
        logicalType: date
        physicalType: DATE
        description: Date the warehouse opened
        logicalTypeOptions:
          minimum: "2000-01-01"
          maximum: "2030-12-31"
  - name: stock_levels
    physicalType: table
    description: Per-SKU stock snapshots
    tags:
      - "layer:bronze"
    properties:
      - name: sku
        logicalType: string
        physicalType: STRING
        required: true
        description: Stock-keeping unit
      - name: quantity
        logicalType: integer
        physicalType: INT
        required: true
        description: Units on hand
        logicalTypeOptions:
          minimum: 0
      - name: snapshot_at
        logicalType: timestamp
        physicalType: TIMESTAMP
        required: true
        description: Snapshot timestamp
        logicalTypeOptions:
          exclusiveMaximum: "2999-01-01T00:00:00"
