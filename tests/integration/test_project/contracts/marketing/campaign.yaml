version: "1.0.0"
apiVersion: v3.0.2
kind: DataContract
id: 33333333-3333-3333-3333-333333333333
status: active
name: campaign-contract
tags:
  - "domain:marketing"
  - "layer:bronze"
schema:
  - name: campaign
    physicalType: table
    description: Marketing campaigns
    properties:
      - name: campaign_id
        logicalType: integer
        physicalType: BIGINT
        required: true
        primaryKey: true
        primaryKeyPosition: 1
        description: Campaign identifier
      - name: campaign_name
        physicalName: name
        logicalType: string
        physicalType: STRING
        required: true
        description: Human-readable campaign name
        tags:
          - "pii:false"
        logicalTypeOptions:
          minLength: 1
          maxLength: 200
      - name: budget
        logicalType: number
        physicalType: DECIMAL(12,2)
        description: Campaign budget
        logicalTypeOptions:
          exclusiveMinimum: 0
      - name: launch_date
        logicalType: date
        physicalType: STRING
        description: Launch date, US-formatted string in the source
        logicalTypeOptions:
          format: "MM/dd/yyyy"
      - name: created_at
        logicalType: timestamp
        physicalType: STRING
        description: Creation timestamp, ISO-with-T string in the source
        logicalTypeOptions:
          format: "yyyy-MM-dd'T'HH:mm:ss"
      - name: updated_at
        logicalType: timestamp
        physicalType: STRING
        description: Update timestamp, wall-clock string in a fixed zone
        logicalTypeOptions:
          format: "yyyy-MM-dd HH:mm:ss"
          timezone: false
          defaultTimezone: "America/New_York"
      - name: audience
        logicalType: object
        physicalType: STRING
        description: Target audience, JSON-encoded object in the source
        properties:
          - name: segment
            logicalType: string
            physicalType: STRING
          - name: size
            logicalType: integer
            physicalType: INT
      - name: channels
        logicalType: array
        physicalType: STRING
        description: Delivery channels, JSON array in the source
        items:
          logicalType: string
          physicalType: STRING
      - name: raw_payload
        logicalType: object
        physicalType: STRING
        description: Free-form vendor payload, parsed to a variant
      - name: tracking_pixel
        logicalType: string
        physicalType: STRING
        description: Base64-encoded tracking pixel bytes
        logicalTypeOptions:
          format: byte
