version: "2.0"
apiVersion: v3.0.2
kind: DataContract
id: 44444444-4444-4444-4444-444444444444
status: active
name: multi-contract
schema:
  - name: orders
    physicalType: table
    description: One row per order
    properties:
      - name: order_id
        logicalType: integer
        physicalType: BIGINT
        required: true
        primaryKey: true
        primaryKeyPosition: 1
        description: Order key
  - name: products
    physicalType: table
    description: Product catalog
    tags:
      - "domain:catalog"
    properties:
      - name: sku
        logicalType: string
        physicalType: STRING
        required: true
        description: Stock-keeping unit
        logicalTypeOptions:
          pattern: "^[A-Z0-9-]+$"
